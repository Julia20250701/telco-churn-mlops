services:
  mlflow:
    image: python:3.12-slim
    container_name: telco_mlflow
    working_dir: /mlflow
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    command: >
      bash -lc "
      pip install --no-cache-dir uv &&
      uv tool run mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
      --host 0.0.0.0
      --port 5000
      "
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlartifacts:/mlflow/mlartifacts
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  predict_api:
    build:
      context: .
      dockerfile: src/predict/Dockerfile
    container_name: telco_predict_api
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREDICT_LOAD_FROM_REGISTRY: "1"
      REGISTERED_MODEL_NAME: telco-churn-classifier
      MODEL_ALIAS: candidate
      PREDICT_API_HOST: 0.0.0.0
      PREDICT_API_PORT: 8000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./mlartifacts:/home/jule/projects/telco-churn-mlops/mlartifacts
      - ./mlartifacts:/mlflow/mlartifacts
    ports:
      - "8000:8000"
    restart: on-failure
